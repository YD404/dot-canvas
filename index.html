<!DOCTYPE html>
<html lang="ja" class="h-full w-full overflow-hidden select-none bg-neutral-900 text-neutral-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DotCanvas</title>
    <!-- Tailwind CSS v4 Browser CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="h-full w-full overflow-hidden font-mono flex flex-col antialiased bg-neutral-950 text-neutral-200">

    <!-- Top Header Bar -->
    <header class="h-10 border-b border-neutral-800 bg-neutral-900 flex items-center justify-between px-3 z-20 shrink-0">
        <div class="flex items-center space-x-3">
            <span class="font-bold tracking-wider text-sm border-r border-neutral-700 pr-3 text-neutral-100">DotCanvas</span>
            
            <!-- Undo / Redo -->
            <div class="flex space-x-1">
                <button id="btn-undo" class="p-1 hover:bg-neutral-800 active:bg-neutral-700 disabled:opacity-30 disabled:hover:bg-transparent" title="Undo">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/></svg>
                </button>
                <button id="btn-redo" class="p-1 hover:bg-neutral-800 active:bg-neutral-700 disabled:opacity-30 disabled:hover:bg-transparent" title="Redo">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M15 15l6-6m0 0l-6-6m6 6H9a6 6 0 000 12h3"/></svg>
                </button>
            </div>
            
            <div class="h-4 w-px bg-neutral-800"></div>

            <!-- Canvas Info & New/Resize -->
            <button id="btn-canvas-size" class="text-xs px-2 py-0.5 border border-neutral-700 hover:bg-neutral-800 text-neutral-300">
                <span id="label-canvas-size">32 × 32</span>
            </button>
        </div>

        <!-- Right Header Actions -->
        <div class="flex items-center space-x-2">
            <!-- Project File (.dotcanvas) operations -->
            <button id="btn-save-project" class="text-xs px-2 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 flex items-center space-x-1" title="プロジェクト保存">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
                <span>保存</span>
            </button>
            <button id="btn-load-project" class="text-xs px-2 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 flex items-center space-x-1" title="プロジェクト開く">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                <span>開く</span>
            </button>
            <input type="file" id="file-input-project" accept=".dotcanvas,.json" class="hidden">

            <div class="h-4 w-px bg-neutral-800"></div>

            <!-- Export Button -->
            <button id="btn-export" class="text-xs px-3 py-1 bg-neutral-100 text-neutral-950 font-bold hover:bg-neutral-300 flex items-center space-x-1" title="書き出し">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                <span>書き出し</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace Area -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- Left Toolbar -->
        <aside class="w-12 bg-neutral-900 border-r border-neutral-800 flex flex-col items-center py-2 space-y-2 z-10 shrink-0 select-none">
            <div id="toolbar-tools" class="flex flex-col space-y-1.5 w-full px-1.5 shrink-0">
                <!-- Tool buttons generated by JS -->
            </div>
            
            <div class="w-8 h-px bg-neutral-800 my-1 shrink-0"></div>

            <!-- Brush Size Control (Native Vertical Slider) -->
            <div class="flex-1 w-full px-1 py-1 flex flex-col items-center justify-between min-h-[140px] relative overflow-hidden">
                <span class="text-[10px] text-neutral-500 mb-0.5 shrink-0">SIZE</span>
                <span id="label-brush-size" class="text-xs font-bold text-neutral-200 mb-1 shrink-0">1</span>
                
                <div class="flex-1 w-full flex items-center justify-center py-1 overflow-hidden">
                    <input type="range" id="input-brush-size" min="0" max="100" value="0" class="input-vertical-range cursor-pointer">
                </div>
            </div>
        </aside>

        <!-- Center Canvas Workspace -->
        <main id="canvas-container" class="flex-1 relative bg-neutral-950 overflow-hidden cursor-crosshair touch-none">
            <!-- Layers & Overlay Canvases (Injected dynamically) -->
        </main>

        <!-- Right Panel Toggle Button (Independent from Panel Element) -->
        <button id="btn-toggle-panel" class="w-6 h-10 bg-neutral-900 border-l border-t border-b border-neutral-800 text-neutral-400 hover:text-neutral-100 flex items-center justify-center z-30 my-auto shrink-0" title="パネル折りたたみ">
            <svg id="icon-toggle-panel" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>

        <!-- Right Side Panels (Tabs or Accordion) -->
        <aside id="right-panel" class="w-64 bg-neutral-900 border-l border-neutral-800 flex flex-col z-10 shrink-0 text-xs transition-all duration-200">
            <!-- Panel Tabs -->
            <div class="flex border-b border-neutral-800 bg-neutral-950">
                <button id="tab-layers" class="flex-1 py-2 text-center font-bold border-b-2 border-neutral-200 text-neutral-100 bg-neutral-900">レイヤー</button>
                <button id="tab-color" class="flex-1 py-2 text-center text-neutral-400 hover:text-neutral-200">カラー</button>
                <button id="tab-ref" class="flex-1 py-2 text-center text-neutral-400 hover:text-neutral-200">下絵</button>
            </div>

            <!-- Panel Content Area -->
            <div class="flex-1 overflow-y-auto p-3 space-y-4">
                
                <!-- Section 1: Layer Panel -->
                <div id="panel-layers-content" class="space-y-3">
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-neutral-400">LAYER LIST</span>
                        <div class="flex space-x-1">
                            <button id="btn-add-layer" class="px-2 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-200">+ 追加</button>
                            <button id="btn-merge-layer" class="px-2 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-200" title="下のレイヤーと結合">結合</button>
                        </div>
                    </div>

                    <!-- Layer List Container -->
                    <div id="layer-list" class="space-y-1.5">
                        <!-- Layers rendered by JS -->
                    </div>

                    <!-- Layer Properties -->
                    <div id="layer-properties" class="pt-2 border-t border-neutral-800 space-y-2">
                        <div class="flex items-center justify-between">
                            <span class="text-neutral-400">不透明度</span>
                            <span id="label-layer-opacity" class="font-mono text-neutral-200">100%</span>
                        </div>
                        <input type="range" id="input-layer-opacity" min="0" max="100" value="100" class="w-full accent-neutral-200">
                    </div>
                </div>

                <!-- Section 2: Color Panel -->
                <div id="panel-color-content" class="space-y-4 hidden">
                    <div>
                        <span class="font-bold text-neutral-400 block mb-2">CURRENT COLOR</span>
                        <div class="flex items-center space-x-2">
                            <div id="color-preview" class="w-10 h-10 border border-neutral-600 bg-black cursor-pointer hover:border-neutral-400 transition-colors" title="カラーピッカーを開く"></div>
                            <div class="flex-1">
                                <label class="text-[10px] text-neutral-500 block">HEX COLOR</label>
                                <input type="text" id="input-color-hex" value="#000000" class="w-full bg-neutral-950 border border-neutral-700 px-2 py-1 font-mono text-neutral-100 uppercase focus:outline-none focus:border-neutral-400">
                            </div>
                        </div>
                    </div>

                    <!-- Color Picker Input -->
                    <div>
                        <input type="color" id="native-color-picker" class="w-full h-8 bg-neutral-950 border border-neutral-700 cursor-pointer p-0">
                    </div>

                    <!-- Canvas Background Color -->
                    <div class="pt-2 border-t border-neutral-800">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="font-bold text-neutral-400">CANVAS BG COLOR</span>
                            <button id="btn-bg-checkerboard" class="text-[10px] px-1.5 py-0.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-300">透明(格子)</button>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="color" id="input-bg-color" value="#18181b" class="w-8 h-8 bg-neutral-950 border border-neutral-700 cursor-pointer p-0">
                            <input type="text" id="input-bg-color-hex" value="透明" readonly class="flex-1 bg-neutral-950 border border-neutral-700 px-2 py-1 font-mono text-neutral-400 text-xs focus:outline-none">
                        </div>
                    </div>

                    <!-- Palette -->
                    <div class="pt-2 border-t border-neutral-800">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="font-bold text-neutral-400">SWATCHES</span>
                            <button id="btn-add-swatch" class="text-[10px] px-1.5 py-0.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-300">+ 色保存</button>
                        </div>
                        <div id="palette-grid" class="grid grid-cols-6 gap-1.5 max-h-48 overflow-y-auto p-1 bg-neutral-950 border border-neutral-800">
                            <!-- Swatches rendered by JS -->
                        </div>
                    </div>

                    <!-- Color Harmonies -->
                    <div class="pt-2 border-t border-neutral-800 space-y-3">
                        <span class="font-bold text-neutral-400 block">COLOR HARMONIES</span>

                        <div>
                            <span class="text-[10px] text-neutral-500 block mb-1">Monochromatic</span>
                            <div id="harmony-monochromatic" class="grid grid-cols-5 gap-1.5 p-1 bg-neutral-950 border border-neutral-800"></div>
                        </div>

                        <div>
                            <span class="text-[10px] text-neutral-500 block mb-1">Analogous</span>
                            <div id="harmony-analogous" class="grid grid-cols-3 gap-1.5 p-1 bg-neutral-950 border border-neutral-800"></div>
                        </div>

                        <div>
                            <span class="text-[10px] text-neutral-500 block mb-1">Split-Complementary</span>
                            <div id="harmony-split" class="grid grid-cols-3 gap-1.5 p-1 bg-neutral-950 border border-neutral-800"></div>
                        </div>

                        <div>
                            <span class="text-[10px] text-neutral-500 block mb-1">Triadic</span>
                            <div id="harmony-triadic" class="grid grid-cols-3 gap-1.5 p-1 bg-neutral-950 border border-neutral-800"></div>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Reference Image Panel -->
                <div id="panel-ref-content" class="space-y-4 hidden">
                    <span class="font-bold text-neutral-400 block mb-1">REFERENCE IMAGE</span>

                    <div class="space-y-2">
                        <button id="btn-load-ref" class="w-full py-1.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-200">下絵を選択...</button>
                        <input type="file" id="file-input-ref" accept="image/*" class="hidden">
                        <button id="btn-remove-ref" class="w-full py-1 bg-neutral-900 border border-neutral-800 text-neutral-500 hover:text-neutral-300 hidden">下絵を消去</button>
                    </div>

                    <div id="ref-controls" class="space-y-3 pt-2 border-t border-neutral-800 hidden">
                        <div>
                            <div class="flex justify-between text-neutral-400 mb-1">
                                <span>不透明度</span>
                                <span id="label-ref-opacity">50%</span>
                            </div>
                            <input type="range" id="input-ref-opacity" min="0" max="100" value="50" class="w-full accent-neutral-200">
                        </div>

                        <div>
                            <div class="flex justify-between text-neutral-400 mb-1">
                                <span>サイズ (マス)</span>
                                <span id="label-ref-size">32</span>
                            </div>
                            <input type="range" id="input-ref-size" min="1" max="256" step="1" value="32" class="w-full accent-neutral-200">
                        </div>

                        <div class="flex space-x-2">
                            <button id="btn-reset-ref-pos" class="flex-1 py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-300">位置リセット</button>
                        </div>
                    </div>
                </div>

            </div>
        </aside>

    </div>

    <!-- Bottom Status Bar -->
    <footer class="h-6 bg-neutral-950 border-t border-neutral-800 px-3 flex items-center justify-between text-[11px] text-neutral-500 z-20 shrink-0">
        <div class="flex items-center space-x-4">
            <span id="status-coords">X: - Y: -</span>
            <span id="status-zoom">100%</span>
        </div>
        <div>
            <span id="status-autosave" class="text-neutral-600">自動保存: 有効</span>
        </div>
    </footer>

    <!-- Modals / Dialogs -->
    
    <!-- Canvas Size Modal -->
    <div id="modal-canvas-size" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="bg-neutral-900 border border-neutral-700 p-5 w-80 space-y-4 shadow-xl">
            <h3 class="text-sm font-bold text-neutral-100 tracking-wider">キャンバスサイズ設定</h3>
            
            <div>
                <span class="text-xs text-neutral-400 mb-1 block">プリセット</span>
                <div class="grid grid-cols-4 gap-1.5 text-xs">
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="8">8</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="16">16</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="32">32</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="64">64</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="128">128</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="256">256</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="512">512</button>
                    <button class="btn-preset-size py-1 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700" data-size="1024">1024</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-xs">
                <div>
                    <label class="text-neutral-400 block mb-1">幅 (8-1024)</label>
                    <input type="number" id="input-canvas-width" min="8" max="1024" value="32" class="w-full bg-neutral-950 border border-neutral-700 p-1.5 font-mono text-neutral-100">
                </div>
                <div>
                    <label class="text-neutral-400 block mb-1">高さ (8-1024)</label>
                    <input type="number" id="input-canvas-height" min="8" max="1024" value="32" class="w-full bg-neutral-950 border border-neutral-700 p-1.5 font-mono text-neutral-100">
                </div>
            </div>

            <p class="text-[10px] text-neutral-500">※サイズ変更すると現在のキャンバス内容はクリアされます。</p>

            <div class="flex justify-end space-x-2 pt-2 border-t border-neutral-800 text-xs">
                <button id="btn-cancel-canvas-size" class="px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700">キャンセル</button>
                <button id="btn-apply-canvas-size" class="px-3 py-1.5 bg-neutral-100 text-neutral-950 font-bold hover:bg-neutral-300">適用</button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="modal-export" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="bg-neutral-900 border border-neutral-700 p-5 w-80 space-y-4 shadow-xl">
            <h3 class="text-sm font-bold text-neutral-100 tracking-wider">画像書き出し</h3>
            
            <div class="text-xs space-y-3">
                <div>
                    <label class="text-neutral-400 block mb-1">フォーマット</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-export-fmt-png" class="py-1.5 bg-neutral-100 text-neutral-950 font-bold border border-neutral-100">透過 PNG</button>
                        <button id="btn-export-fmt-svg" class="py-1.5 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 border border-neutral-700">ベクター SVG</button>
                    </div>
                </div>

                <div>
                    <label class="text-neutral-400 block mb-1">書き出し対象</label>
                    <select id="select-export-scope" class="w-full bg-neutral-950 border border-neutral-700 p-1.5 text-neutral-100">
                        <option value="all">全レイヤー統合</option>
                        <option value="active">アクティブレイヤーのみ</option>
                    </select>
                </div>

                <div>
                    <label class="text-neutral-400 block mb-1">出力スケール (PNG)</label>
                    <select id="select-export-scale" class="w-full bg-neutral-950 border border-neutral-700 p-1.5 text-neutral-100">
                        <option value="1">1x (等倍)</option>
                        <option value="2">2x</option>
                        <option value="4">4x</option>
                        <option value="8">8x</option>
                        <option value="16">16x</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end space-x-2 pt-2 border-t border-neutral-800 text-xs">
                <button id="btn-cancel-export" class="px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700">キャンセル</button>
                <button id="btn-do-export" class="px-3 py-1.5 bg-neutral-100 text-neutral-950 font-bold hover:bg-neutral-300">ダウンロード</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
